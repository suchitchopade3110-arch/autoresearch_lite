sandbox:
  timeout_seconds: 5
  cpu_limit: "0.5"
  memory_limit: "256m"

dataset:
  path: "dummy_data/dataset.jsonl"
  size: 1000
  seed: 42

eval:
  stages:
    - subset_percentage: 1
      threshold: 0.5
    - subset_percentage: 5
      threshold: 0.6
    - subset_percentage: 20
      threshold: 0.7
    - subset_percentage: 100
      threshold: 0.8

# Sequential mode only (--mode sequential, the default)
orchestrator:
  max_iterations: 1
  target_score: 1.0
  patience: 1

# Evolutionary mode only (--mode evolutionary)
evolution:
  population_size: 5
  max_generations: 3
  max_concurrent_sandboxes: 3
  duplicate_threshold: 0.25
  selection_strategy: tournament
  scoring_strategy: pareto
  random_seed: 42

generation:
  max_retrieved_failures: 2
  max_retrieved_successes: 2
  prompt_char_budget: 4000
